document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ar{flex:none;height:var(--topbar-h);display:flex;align-items:center;gap:14px;\n    padding:0 14px;background:var(--panel);border-bottom:1px solid var(--hair);z-index:30}\n  .brand{display:flex;align-items:center;gap:11px;flex:none;min-width:calc(var(--left-w) - 14px)}\n  .brand .logo{width:24px;height:24px;object-fit:contain}\n  .brand .word{font-size:16px;font-weight:600;letter-spacing:.04em;color:var(--text)}\n  .tb-div{width:1px;height:24px;background:var(--hair);flex:none}\n\n  .tb-group{display:flex;align-items:center;gap:7px;flex:none}\n  .tb-readout{font-size:11px;color:var(--text-2);letter-spacing:.02em;min-width:104px;white-space:nowrap}\n  .tb-toggle{appearance:none;border:1px solid var(--hair);background:var(--ctrl);color:var(--text-2);\n    font-family:inherit;font-size:11px;letter-spacing:.04em;padding:7px 11px;border-radius:var(--r-btn);cursor:pointer;transition:all .12s;white-space:nowrap}\n  .tb-toggle:hover{background:var(--ctrl-hover);color:var(--text)}\n  .tb-toggle.on{background:var(--accent-tint);border-color:var(--accent-border);color:var(--accent-bright);box-shadow:0 0 0 1px var(--accent-border),0 0 14px -4px var(--accent-glow)}\n\n  /* round icon buttons (zoom, canvas actions, copy, settings) */\n  .ibtn{appearance:none;width:32px;height:32px;border-radius:var(--r-btn);border:1px solid var(--hair);\n    background:var(--ctrl);color:var(--text-2);cursor:pointer;display:grid;place-items:center;transition:all .12s;flex:none}\n  .ibtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}\n  .ibtn:hover{background:var(--ctrl-hover);color:var(--text)}\n  .ibtn.on{color:var(--accent-bright);border-color:var(--accent-border);background:var(--accent-tint)}\n  .ibtn:disabled{opacity:.4;cursor:not-allowed}\n\n  /* mode tabs (segmented) */\n  .tb-modes{display:flex;gap:3px;background:var(--ctrl);border:1px solid var(--hair);border-radius:var(--r-btn);padding:3px}\n  .tb-modes .tab{display:flex;align-items:center;gap:7px;appearance:none;border:1px solid transparent;background:none;\n    color:var(--text-2);font-family:inherit;font-size:12px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .12s;white-space:nowrap}\n  .tb-modes .tab svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}\n  .tb-modes .tab:hover{color:var(--text)}\n  .tb-modes .tab.active{background:var(--accent-tint);color:var(--accent-bright);border-color:var(--accent-border);box-shadow:0 0 12px -4px var(--accent-glow)}\n  .tb-modes .tsub{font-size:10px;opacity:.65}\n\n  .tb-spacer{flex:1}\n\n  /* export cluster */\n  .tb-export{display:flex;align-items:center;gap:8px;flex:none}\n  .export-btn{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-weight:600;font-size:13px;\n    padding:9px 16px;border-radius:var(--r-btn);border:1px solid var(--accent);background:var(--accent);color:#fff;\n    cursor:pointer;transition:all .12s;box-shadow:0 0 18px -4px var(--accent-glow)}\n  .export-btn:hover{background:var(--accent-bright);border-color:var(--accent-bright)}\n  .export-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}\n  .export-btn .dl-caret{font-size:10px;opacity:.85}\n\n  .dl-wrap,.cfg-wrap{position:relative;display:inline-flex}\n  .dl-menu,.cfg-pop{position:absolute;top:calc(100% + 8px);right:0;min-width:176px;background:var(--panel);\n    border:1px solid var(--hair-2);border-radius:var(--r-btn);padding:5px;display:flex;flex-direction:column;gap:2px;\n    z-index:40;box-shadow:0 14px 40px rgba(0,0,0,.65)}\n  .dl-menu button{appearance:none;width:100%;text-align:left;background:none;border:none;border-radius:6px;\n    padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--text-2);cursor:pointer;transition:background .1s,color .1s}\n  .dl-menu button:hover{background:var(--ctrl);color:var(--text)}\n  .dl-menu button.hide{display:none}\n  .cfg-pop{min-wid n                  <button class=\"chip\" data-form=\"cell16\">16-cell · Orthoplex<\u002Fbutton>\n                  <button class=\"chip\" data-form=\"cell24\">24-cell<\u002Fbutton>\n                  <button class=\"chip\" data-form=\"penteract\">Penteract · 5-cube<\u002Fbutton>\n                  <button class=\"chip\" data-form=\"cell120\">120-cell<\u002Fbutton>\n                  <button class=\"chip\" data-form=\"cell600\">600-cell<\u002Fbutton>\n                  <button class=\"chip\" data-form=\"hopf\" style=\"grid-column:1/-1\">Hopf Fibration<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"acc-item\">\n              <div class=\"acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"false\"><span class=\"acc-title\">Organic &amp; symbolic<\u002Fspan><svg class=\"acc-chev\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div class=\"acc-body\">\n                <div class=\"forms\" data-comment-anchor=\"c06b958fda-div\">\n                  <button class=\"chip\" data-form=\"jelly\">Fountain<\u002Fbutton>\n                  <button class=\"chip\" data-form=\"heart\" data-comment-anchor=\"e9e671dfea-button\">Heart<\u002Fbutton>\n                  <button class=\"chip\" data-form=\"star\">Star<\u002Fbutton>\n                  <button class=\"chip\" data-form=\"rings\">Ring Cluster<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"acc-item\">\n              <div class=\"acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"false\"><span class=\"acc-title\">Math attractors<\u002Fspan><svg class=\"acc-chev\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 6l6 6-6 6\"> iv>\n            <div class=\"stat\"><div class=\"num\" id=\"statSize\">—<\u002Fdiv><div class=\"cap\">TXT size<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv><!-- /imageControlsRight -->\n\n      <!-- text-mode right: render + output -->\n      <div id=\"textControlsRight\" hidden=\"\">\n        <div class=\"group\" data-comment-anchor=\"8ffa5b7916-div\">\n          <p class=\"eyebrow\">Geometry<\u002Fp>\n          <div class=\"slider-block\"><div class=\"row\"><label for=\"taDensity\">Character Density<\u002Flabel><span class=\"val\" id=\"taDensityVal\">2,200<\u002Fspan><\u002Fdiv><input type=\"range\" id=\"taDensity\" min=\"300\" max=\"9000\" step=\"100\" value=\"2200\"><\u002Fdiv>\n          <div class=\"slider-block\"><div class=\"row\"><label for=\"taDepth\">Depth<\u002Flabel><span class=\"val\" id=\"taDepthVal\">55<\u002Fspan><\u002Fdiv><input type=\"range\" id=\"taDepth\" min=\"0\" max=\"100\" value=\"55\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"group\">\n          <p class=\"eyebrow\">Motion<\u002Fp>\n          <div class=\"chips\" id=\"taMotion\" data-comment-anchor=\"422260001f-div\">\n            <button class=\"chip\" data-motion=\"none\" data-comment-anchor=\"e0f9992f87-button\">None<\u002Fbutton>\n            <button class=\"chip active\" data-motion=\"orbit\" data-comment-anchor=\"3cbddb94af-button\">Orbit<\u002Fbutton>\n            <button class=\"chip\" data-motion=\"wave\">Wave<\u002Fbutton>\n            <button class=\"chip\" data-motion=\"breathe\">Breathe<\u002Fbutton>\n            <button class=\"chip\" data-motion=\"flow\">Flow<\u002Fbutton>\n            <button class=\"chip\" data-motion=\"noise\">Noise Field<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"group\">\n          <p class=\"eyebrow\">Speed<\u002Fp>\n          <div class=\"slider-block\"><div class=\"row\"><label for=\"taSpeed\">Speed<\u002Flabel><span class=\"val\" id=\"taSpeedVal\">46<\u002Fspan><\u002Fdiv><input type=\"range\" id=\"taSpeed\" min=\"0\" max=\"100\" value=\"46\"><\u002Fdiv>\n          <div class=\"slider-block\"><div class=\"row\"><label for=\"taAmp\">Amplitude<\u002Flabel><span class=\"val\" id=\"taAmpVal\">48<\u002Fspan><\u002Fdiv><input type=\"range\" id=\"taAmp\" min=\"0\" max=\"100\" value=\"48\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"group\">\n          <p class=\"eyebrow\">Mouse interaction<\u002Fp>\n          <div class=\"seg\" id=\"taMouse\">\n            <button data-m=\"none\">None<\u002Fbutton>\n            <button data-m=\"follow\" class=\"active\">Follow<\u002Fbutton>\n            <button data-m=\"distort\">Distort<\u002Fbutton>\n            <button data-m=\"swirl\">Swirl<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"slider-block\" style=\"margin-top:13px\"><div class=\"row\"><label for=\"taRadius\">Radius<\u002Flabel><span class=\"val\" id=\"taRadiusVal\">52<\u002Fspan><\u002Fdiv><input type=\"range\" id=\"taRadius\" min=\"5\" max=\"100\" value=\"52\"><\u002Fdiv>\n          <div class=\"slider-block\"><div class=\"row\"><label for=\"taStrength\">Strength<\u002Flabel><span class=\"val\" id=\"taStrengthVal\">55<\u002Fspan><\u002Fdiv><input type=\"range\" id=\"taStrength\" min=\"0\" max=\"100\" value=\"55\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"group\">\n          <p class=\"eyebrow\">Colors<\u002Fp>\n          <div class=\"color-row\">\n            <span class=\"color-lbl\">Glyphs<\u002Fspan>\n            <div class=\"swatches\" id=\"taTextSwatches\"><\u002Fdiv>\n            <label class=\"picker\"><input type=\"color\" id=\"taTextColor\" value=\"#FFFFFF\" aria-label=\"Custom glyph color\"><\u002Flabel>\n          <\u002Fdiv>\n          <div class=\"color-row\">\n            <span class=\"color-lbl\">Background<\u002Fspan>\n            <div class=\"swatches\" id=\"taBgSwatches\"><\u002Fdiv>\n            <label class=\"picker\"><input type=\"color\" id=\"taBgColor\" value=\"#000000\" aria-label=\"Custom background color\"><\u002Flabel>\n          <\u002Fdiv>\n          <p class=\"color-hint\">applies to the canvas &amp; the exported .html · depth dims glyphs front-to-back<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"group\">\n          <p class=\"eyebrow\">Statistics<\u002Fp>\n          <div class=\"stats cols-3\">\n            <div class=\"stat\"><div class=\"num\" id=\"taStatP\">—<\u002Fdiv><div class=\"cap\">Total Chars<\u002Fdiv><\u002Fdiv>\n            <div class=\"stat\"><div class=\"num success\" id=\"taStatProc\">—<\u002Fdiv><div class=\"cap\">Processing<\u002Fdiv><\u002Fdiv>\n            <div class=\"stat\"><div class=\"num\" id=\"taStatMem\">—<\u002Fdiv><div class=\"cap\">Memory<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <span id=\"taStatFps\" hidden=\"\"><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"group\">\n          <button class=\"btn full\" id=\"taReset\">Reset to Defaults<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv><!-- /textControlsRight -->\n    <\u002Faside>\n  <\u002Fdiv>\n\n  <!-- ===================== STATUS BAR ===================== -->\n  <div class=\"statusbar\">\n    <div class=\"sb-left\">\n      <span>X: <b id=\"sbX\">0<\u002Fb><\u002Fspan>\n      <span>Y: <b id=\"sbY\">0<\u002Fb><\u002Fspan>\n      <span class=\"sb-sep\">|<\u002Fspan>\n      <span>Char: <span class=\"sb-char\" id=\"sbChar\">—<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sb-right\" data-comment-anchor=\"d09e87695c-div\"><span>Format: <b id=\"sbFormat\">Plain text<\u002Fb><\u002Fspan><span class=\"sb-sep\">|<\u002Fspan><a class=\"sb-link\" href=\"https://www.linkedin.com/in/subrata-dhar/\" target=\"_blank\" rel=\"noopener\">Subrata Dhar ↗<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>\n\n<!-- Legacy keep-alive: the original IIFE handlers still target these IDs.\n     They stay in the DOM so existing logic enables/disables/listens correctly. -->\n<div class=\"legacy-keep\" aria-hidden=\"true\">\n  <span id=\"imageActions\"><\u002Fspan>\n  <span id=\"textActions\"><\u002Fspan>\n  <button id=\"copy\" disabled=\"\"><\u002Fbutton>\n  <button id=\"cfgBtn\"><\u002Fbutton><div id=\"cfgPop\" hidden=\"\"><\u002Fdiv>\n  <button id=\"dlBtn\" disabled=\"\"><\u002Fbutton>\n  <div id=\"dlMenu\" hidden=\"\">\n    <button id=\"dlTxt\"><\u002Fbutton>\n    <button id=\"dlPng\"><\u002Fbutton>\n    <button id=\"dlJson\"><\u002Fbutton>\n    <button id=\"dlHtml\" class=\"hide\"><\u002Fbutton>\n  <\u002Fdiv>\n  <button id=\"fontUp\" disabled=\"\"><\u002Fbutton>\n  <button id=\"fontDown\" disabled=\"\"><\u002Fbutton>\n  <button id=\"taDownload\"><\u002Fbutton>\n<\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\" style=\"position:fixed;left:50%;bottom:46px;transform:translateX(-50%) translateY(20px);background:var(--panel);color:var(--accent-bright);font-family:var(--mono);font-size:13px;padding:11px 18px;border-radius:10px;border:1px solid var(--accent-border);opacity:0;transition:all .2s;pointer-events:none;z-index:50\"><\u002Fdiv>\n<style>.toast.show{opacity:1!important;transform:translateX(-50%) translateY(0)!important}<\u002Fstyle>\n\n<!-- ===================== IMAGE / GIF ENGINE (verbatim) ===================== -->\n<script>\n(function(){\n  const RAMPS={\n    'Classic':' .:-=+*#%@',\n    'Detailed':\" .'`^\\\",:;Il!i><~+_-?][}{1)(|\\\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$\",\n    'Blocks':' \\u2591\\u2592\\u2593\\u2588',\n    'Minimal':' .:#',\n    'Dots':' \\u00b7\\u2236\\u2238\\u26ab',\n    'Hatch':\" .,'-+=ox%#@\"\n  };\n  let ramp=RAMPS['Classic'];\n  let frames=[];\n  let curFrame=0, fontSize=5, playing=false, rafId=null, lastTs=0, acc=0, objURL=null;\n  let textColor='#F62440', bgColor='#11141C';\n  const $=id=>document.getElementById(id);\n  // ghost stubs for removed HUD elements so existing JS refs stay valid\n  ['fpsVal','frameTop'].forEach(id=>{const s=document.createElement('span');s.id=id;s.hidden=true;document.body.appendChild(s);});\n  const out=$('out'),scroll=$('scroll'),empty=$('empty'),origImg=$('origImg');\n  const cv=document.createElement('canvas'),cx=cv.getContext('2d',{willReadFrequently:true});\n\n  // ---- ramp tiles ----\n  const rampsEl=$('ramps');\n  Object.keys(RAMPS).forEach((name,i)=>{\n    const sample=RAMPS[name].replace(/ /g,'·').slice(0,9);\n    const c=document.createElement('button');\n    c.className='ramp-tile'+(i===0?' active':'');c.dataset.name=name;\n    c.innerHTML='<span class=\"glyphs\">'+sample.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;')+'<\u002Fspan><span class=\"cap\">'+name+'<\u002Fspan>';\n    c.addEventListener('click',()=>{selectRamp(name);});\n    rampsEl.appendChild(c);\n  });\n  function selectRamp(name){\n    document.querySelectorAll('.ramp-tile').forEach(x=>x.classList.toggle('active',x.dataset.name===name));\n    ramp=RAMPS[name];$('custom').value='';render(false);\n  }\n  $('custom').addEventListener('input',e=>{\n    if(e.target.value.length){document.querySelectorAll('.ramp-tile').forEach(x=>x.classList.remove('active'));ramp=e.target.value;}\n    else{ramp=RAMPS['Classic'];document.querySelector('.ramp-tile').classList.add('active');}\n    render(false);\n  });\n\n  function bindToggle(el,cb){const fn=()=>{el.classList.toggle('on');el.setAttribute('aria-checked',el.classList.contains('on'));cb();};el.addEventListener('click',fn);el.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();fn();}});}\n  bindToggle($('invert'),()=>render(false));\n  bindToggle($('colorize'),()=>render(false));\n\n  // ---- colors ----\n  const TEXT_PRESETS=['#F62440','#5FB37A','#36A0E6','#ECEDF0'];\n  const BG_PRESETS=['#11141C','#06070E','#000000','transparent'];\n  function hexToRgba(hex,a){let h=hex.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}\n  function applyColors(){\n    scroll.style.background=bgColor;\n    if(out.classList.contains('color')){out.style.color='';out.style.textShadow='none';}\n    else{out.style.color=textColor;out.style.textShadow='0 0 6px '+hexToRgba(textColor,.25);}\n  }\n  function buildSwatches(containerId,presets,picker,isText){\n    const cEl=$(containerId);\n    presets.forEach((col,i)=>{\n      const isTrans=col==='transparent';\n      const b=document.createElement('button');\n      b.className='swatch'+(i===0?' active':'')+(isTrans?' transparent-swatch':'');\n      if(!isTrans)b.style.background=col;\n      b.title=isTrans?'Transparent':col;\n      b.setAttribute('aria-label',(isText?'Text':'Background')+' color '+(isTrans?'transparent':col));\n      b.addEventListener('click',()=>{\n        cEl.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));b.classList.add('active');\n        if(!isTrans)picker.value=col;if(isText)textColor=col;else bgColor=col;applyColors();\n      });\n      cEl.appendChild(b);\n    });\n  }\n  buildSwatches('textSwatches',TEXT_PRESETS,$('textColor'),true);\n  buildSwatches('bgSwatches',BG_PRESETS,$('bgColor'),false);\n  $('textColor').addEventListener('input',e=>{textColor=e.target.value;$('textSwatches').querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));applyColors();});\n  $('bgColor').addEventListener('input',e=>{bgColor=e.target.value;$('bgSwatches').querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));applyColors();});\n  applyColors();\n\n  // ---- size segmented ----\n  function syncSizeSeg(){\n    const v=$('cols').value;let matched=false;\n    document.querySelectorAll('#sizeSeg button').forEach(b=>{\n      const on=b.dataset.cols===v;b.classList.toggle('active',on);if(on)matched=true;\n    });\n    if(!matched)document.querySelector('#sizeSeg .custom-seg').classList.add('active');\n  }\n  document.querySelectorAll('#sizeSeg button').forEach(b=>{\n    b.addEventListener('click',()=>{\n      if(!b.dataset.cols){document.querySelectorAll('#sizeSeg button').forEach(x=>x.classList.remove('active'));b.classList.add('active');return;}\n      $('cols').value=b.dataset.cols;$('colsVal').textContent=b.dataset.cols;syncSizeSeg();render(true);\n    });\n  });\n\n  function slider(id,valId,fmt,after){const s=$(id),v=$(valId);s.addEventListener('input',()=>{v.textContent=fmt(s.value);if(after)after();render(false);});}\n  slider('cols','colsVal',v=>v,syncSizeSeg);\n  slider('contrast','contrastVal',v=>(v/100).toFixed(2));\n  slider('bright','brightVal',v=>v);\n  $('speed').addEventListener('input',()=>{updateFrameInfo();});\n\n  // ---- preview header buttons ----\n  $('btnOrig').addEventListener('click',()=>{\n    if(!objURL)return;\n    const on=origImg.style.display!=='block';\n    origImg.src=objURL;origImg.style.display=on?'block':'none';out.style.display=on?'none':'';\n    $('btnOrig').classList.toggle('on',on);\n  });\n  $('btnFull').addEventListener('click',()=>{\n    const el=$('previewCanvas');\n    if(!document.fullscreenElement){el.requestFullscreen&&el.requestFullscreen();}\n    else{document.exitFullscreen&&document.exitFullscreen();}\n  });\n\n  // ---- file load + frame decode ----\n  const fileInput=$('file'),drop=$('drop');\n  drop.addEventListener('click',()=>fileInput.click());\n  drop.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fileInput.click();}});\n  fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});\n  ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));\n  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));\n  drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadFile(f);});\n  window.addEventListener('paste',e=>{const items=e.clipboardData?.items||[];for(const it of items){if(it.type.startsWith('image/')){loadFile(it.getAsFile());break;}}});\n  $('clearFile').addEventListener('click',()=>{\n    pause();frames.forEach(f=>{if(f.src&&f.src.close)f.src.close();});frames=[];curFrame=0;\n    if(objURL){URL.revokeObjectURL(objURL);objURL=null;}\n    $('filerow').classList.remove('show');origImg.style.display='none';$('btnOrig').classList.remove('on');out.style.display='';\n    out.textContent='';out.innerHTML='';empty.style.display='grid';$('playback').classList.remove('show');\n    $('dlHtml').classList.add('hide');['copy','dlBtn','fontUp','fontDown','btnFontUp','btnFontDown'].forEach(b=>$(b).disabled=true);\n    ['statW','statH','statC','statSize'].forEach(s=>$(s).textContent='—');$('fpsVal').textContent='—';$('frameTop').textContent='still';$('stageName').textContent='output.txt';\n  });\n\n  async function loadFile(file){\n    pause();\n    frames.forEach(f=>{if(f.src&&f.src.close)f.src.close();});\n    frames=[];curFrame=0;\n    if(objURL)URL.revokeObjectURL(objURL);\n    objURL=URL.createObjectURL(file);\n    $('thumbImg').src=objURL;$('filerow').classList.add('show');\n    $('fname').textContent=file.name||'image';\n    origImg.style.display='none';out.style.display='';$('btnOrig').classList.remove('on');\n\n    let decoded=[];\n    if('ImageDecoder' in window){\n      try{\n        const buf=await file.arrayBuffer();\n        const dec=new ImageDecoder({data:buf,type:file.type});\n        await dec.tracks.ready;\n        const count=dec.tracks.selectedTrack.frameCount||1;\n        for(let i=0;i<count;i++){\n          const res=await dec.decode({frameIndex:i});\n          const bmp=await createImageBitmap(res.image);\n          decoded.push({src:bmp,delay:res.image.duration?Math.max(20,res.image.duration/1000):100});\n          res.image.close();\n        }\n      }catch(err){decoded=[];}\n    }\n    if(!decoded.length){\n      const bmp=await new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=objURL;});\n      decoded=[{src:bmp,delay:0}];\n    }\n    frames=decoded;\n    const animated=frames.length>1;\n    const w=frames[0].src.width||frames[0].src.naturalWidth,h=frames[0].src.height||frames[0].src.naturalHeight;\n    $('badge').textContent=w+' × '+h+(animated?(' · '+frames.length+' frames'):' · still');\n    $('stageName').textContent=animated?'animation.html':'output.txt';\n    $('playback').classList.toggle('show',animated);\n    $('dlHtml').classList.toggle('hide',!animated);\n    $('scrub').max=Math.max(0,frames.length-1);$('scrub').value=0;\n    ['copy','dlBtn','fontUp','fontDown','btnFontUp','btnFontDown'].forEach(b=>$(b).disabled=false);\n    render(true);\n    updateFrameInfo();\n  }\n\n  // ---- ascii core ----\n  function frameToAscii(src){\n    const cols=+$('cols').value;\n    const contrast=+$('contrast').value/100;\n    const brightAdj=+$('bright').value;\n    const invert=$('invert').classList.contains('on');\n    const color=$('colorize').classList.contains('on');\n    const rows=Math.max(1,Math.round(cols*(src.height/src.width)*0.5));\n    cv.width=cols;cv.height=rows;cx.drawImage(src,0,0,cols,rows);\n    const data=cx.getImageData(0,0,cols,rows).data;\n    const chars=ramp.length?ramp:' ';\n    let txt='',grid=[];\n    for(let y=0;y<rows;y++){\n      const line=[];\n      for(let x=0;x<cols;x++){\n        const i=(y*cols+x)*4;\n        const r=data[i],g=data[i+1],b=data[i+2];\n        let lum=0.299*r+0.587*g+0.114*b;\n        lum=(lum-128)*contrast+128+brightAdj;\n        lum=Math.max(0,Math.min(255,lum));\n        let t=lum/255;if(invert)t=1-t;\n        const ch=chars[Math.min(chars.length-1,Math.floor(t*(chars.length-1)))];\n        txt+=ch;\n        line.push(color?{ch,c:'rgb('+r+','+g+','+b+')'}:{ch});\n      }\n      txt+='\\n';grid.push(line);\n    }\n    return {txt,grid,cols,rows,color};\n  }\n  function gridToHTML(grid){\n    return grid.map(line=>line.map(o=>{\n      const safe=o.ch===' '?'&nbsp;':o.ch.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n      return o.c?'<span style=\"color:'+o.c+'\">'+safe+'<\u002Fspan>':safe;\n    }).join('')).join('\\n');\n  }\n\n  let last=null;\n  function render(sweep){\n    if(!frames.length)return;\n    const r=frameToAscii(frames[curFrame].src);last=r;\n    if(r.color){out.classList.add('color');out.innerHTML=gridToHTML(r.grid);}\n    else{out.classList.remove('color');out.textContent=r.txt;}\n    out._txt=r.txt;\n    empty.style.display='none';\n    out.style.fontSize=fontSize+'px';\n    applyColors();\n    // stats\n    $('statW').textContent=r.cols;$('statH').textContent=r.rows;\n    $('statC').textContent=(r.cols*r.rows).toLocaleString();\n    const bytes=new Blob([r.txt]).size;\n    $('statSize').textContent=bytes<1024?bytes+' B':(bytes/1024).toFixed(1)+' KB';\n    if(sweep && !matchMedia('(prefers-reduced-motion:reduce)').matches){\n      scroll.classList.remove('sweeping');void scroll.offsetWidth;scroll.classList.add('sweeping');\n    }\n  }\n\n  // ---- playback ----\n  function updateFrameInfo(){\n    const animated=frames.length>1;\n    $('frameinfo').textContent=(curFrame+1)+' / '+frames.length;\n    $('scrub').value=curFrame;\n    if(animated){\n      $('frameTop').textContent='frame '+(curFrame+1)+' / '+frames.length;\n      const speed=+$('speed').value/100;const delay=(frames[curFrame].delay||100)/speed;\n      $('fpsVal').textContent=Math.round(1000/delay)+' fps';\n    }else{$('frameTop').textContent='still';$('fpsVal').textContent='—';}\n  }\n  function tick(ts){\n    if(!playing)return;\n    if(!lastTs)lastTs=ts;\n    acc+=ts-lastTs;lastTs=ts;\n    const speed=+$('speed').value/100;\n    const delay=(frames[curFrame].delay||100)/speed;\n    if(acc>=delay){acc=0;curFrame=(curFrame+1)%frames.length;render(false);updateFrameInfo();}\n    rafId=requestAnimationFrame(tick);\n  }\n  function play(){if(frames.length<2)return;playing=true;lastTs=0;acc=0;rafId=requestAnimationFrame(tick);$('play').textContent='Pause';}\n  function pause(){playing=false;if(rafId)cancelAnimationFrame(rafId);$('play').textContent='Play';}\n  $('play').addEventListener('click',()=>{playing?pause():play();});\n  $('scrub').addEventListener('input',e=>{pause();curFrame=+e.target.value;render(false);updateFrameInfo();});\n\n  // ---- font ----\n  $('fontUp').addEventListener('click',()=>{fontSize=Math.min(22,fontSize+1);out.style.fontSize=fontSize+'px';});\n  $('fontDown').addEventListener('click',()=>{fontSize=Math.max(3,fontSize-1);out.style.fontSize=fontSize+'px';});\n  // overlay font buttons mirror the legacy ones (and inherit their disabled state on file load/unload)\n  $('btnFontUp').addEventListener('click',()=>$('fontUp').click());\n  $('btnFontDown').addEventListener('click',()=>$('fontDown').click());\n\n  // ---- download dropdown ----\n  {const dlBtn=$('dlBtn'),dlMenu=$('dlMenu');\n  dlBtn.addEventListener('click',e=>{e.stopPropagation();dlMenu.hidden=!dlMenu.hidden;});\n  document.addEventListener('click',()=>{dlMenu.hidden=true;});\n  dlMenu.addEventListener('click',()=>{setTimeout(()=>{dlMenu.hidden=true;},60);});}\n\n  // ---- toast ----\n  let toastT;function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}\n\n  // ---- static exports ----\n  $('copy').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(out._txt||'');toast('Copied to clipboard');}catch{const ta=document.createElement('textarea');ta.value=out._txt||'';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Copied to clipboard');}});\n  $('dlTxt').addEventListener('click',()=>{const b=new Blob([out._txt||''],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ascii-art.txt';a.click();URL.revokeObjectURL(a.href);toast('Saved ascii-art.txt');});\n  $('dlPng').addEventListener('click',()=>{\n    if(!last)return;const {grid,color,cols,rows}=last;const fs=12,cw=fs*0.6,ch=fs,pad=24;\n    const c=document.createElement('canvas');c.width=Math.ce *cw+pad*2);c.height=Math.ceil(rows*ch+pad*2);\n      const g=c.getContext('2d');g.fillStyle=color?'#06070E':bgColor;g.fillRect(0,0,c.width,c.height);\n      g.font=fs+\"px 'JetBrains Mono', monospace\";g.textBaseline='top';\n      for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){const o=grid[y][x];if(o.ch===' ')continue;g.fillStyle=color?o.c:textColor;g.fillText(o.ch,pad+x*cw,pad+y*ch);}\n      c.toBlob(b=>res(b),'image/png');\n    })\n  };\n\n  function buildPlayer(data,color,fs){\n    const json=JSON.stringify(data);\n    const glow=hexToRgba(textColor,.25);\n    return '<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">'\n    +'<title>ASCII Animation<\u002Ftitle><style>'\n    +'html,body{margin:0;height:100%;background:'+bgColor+';color:'+textColor+';font-family:monospace}'\n    +'.box{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px}'\n    +'pre{margin:0;white-space:pre;line-height:1;font-size:'+fs+'px'+(color?'':';text-shadow:0 0 6px '+glow)+'}'\n    +'.bar{margin-top:14px;display:flex;gap:10px;align-items:center;font-size:13px}'\n    +'button{font-family:monospace;background:'+textColor+';color:'+bgColor+';border:0;border-radius:8px;padding:8px 16px;cursor:pointer;font-weight:700}'\n    +'input{width:140px}'\n    +'<\u002Fstyle><\u002Fhead><body><div class=\"box\"><pre id=\"s\"><\u002Fpre>'\n    +'<div class=\"bar\"><button id=\"p\">Pause<\u002Fbutton><span id=\"n\"><\u002Fspan>'\n    +'speed <input type=\"range\" id=\"sp\" min=\"25\" max=\"300\" value=\"100\"><\u002Fdiv><\u002Fdiv>'\n    +'<script>var F='+json+',C='+color+',i=0,playing=true,t=null;'\n    +'var s=document.getElementById(\"s\"),n=document.getElementById(\"n\"),p=document.getElementById(\"p\"),sp=document.getElementById(\"sp\");'\n    +'function paint(){if(C)s.innerHTML=F[i].c;else s.textContent=F[i].c;n.textContent=(i+1)+\" / \"+F.length;}'\n    +'function step(){i=(i+1)%F.length;paint();schedule();}'\n    +'function schedule(){if(!playing)return;t=setTimeout(step,Math.max(20,F[i].d*100/(+sp.value)));}'\n    +'p.onclick=function(){playing=!playing;p.textContent=playing?\"Pause\":\"Play\";if(playing)schedule();else clearTimeout(t);};'\n    +'sp.oninput=function(){};'\n    +'paint();schedule();'\n    +'<\\/script><\u002Fbody><\u002Fhtml>';\n  }\n\n  function buildStill(content,color,fs){\n    const glow=hexToRgba(textColor,.25);\n    const esc=s=>String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n    return '<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">'\n    +'<title>ASCII Art<\u002Ftitle><style>'\n    +'html,body{margin:0;height:100%;background:'+bgColor+';color:'+textColor+';font-family:monospace}'\n    +'.box{min-height:100%;display:flex;align-items:center;justify-content:center;padding:14px}'\n    +'pre{margin:0;white-space:pre;line-height:1;font-size:'+fs+'px'+(color?'':';text-shadow:0 0 6px '+glow)+'}'\n    +'<\u002Fstyle><\u002Fhead><body><div class=\"box\"><pre id=\"s\">'+(color?content:esc(content))+'<\u002Fpre><\u002Fdiv><\u002Fbody><\u002Fhtml>';\n  }\n})();\n<\u002Fscript>\n\n<!-- Text Art mode -->\n<script src=\"4bffc949-4e37-4de4-8495-81b7b7814e87\"><\u002Fscript>\n<script src=\"f08a5ce6-d38a-4796-8fc6-8350c251fb59\"><\u002Fscript>\n<script>\n(function(){\n  const $=id=>document.getElementById(id);\n  let engine=null, mode='image';\n\n  const cfg={\n    text:'HELLO', charset:'word', form:'sphere', density:2200,\n    depth:55, motion:'orbit', speed:46, amplitude:48,\n    mouse:'follow', radius:52, strength:55,\n    sfM:7, sfN1:0.2, sfN2:1.7, sfN3:1.7,\n    scale:1, fontScale:1,\n    roundness:0, lockRotation:false, imageSrc:null, imageInvert:true, imageColor:false, imageFlipV:false, imageDetail:4000, imageAutoDetail:false, imageThickness:50,\n    _imageSrcOrig:null,\n    maskImage:(window.HANDS_MASK||null),\n    t gurative masks pull their built-in outline.\n  // the Image-plane controls (Stop rotation + Roundness) appear only for the uploaded-image form.\n  function onFormChange(){\n    $('sec-super').hidden = cfg.form!=='super';\n    $('sec-imgplane').hidden = cfg.form!=='image';\n    // Typed-Text Silhouette is a flat text mask — keep it facing the viewer so the\n    // word reads correctly (spinning would expose the mirrored back face).\n    cfg.lockRotation = cfg.form==='silhouette';\n    readout();\n  }\n\n  // ---- image-plane controls (contextual) ----\n  (function(){ const s=$('taRoundness'),v=$('taRoundnessVal'); s.addEventListener('input',()=>{ cfg.roundness=+s.value; v.textContent=s.value; push(); }); })();\n  var MAX_DETAIL_RAMP=\" .'`^\\\",:;Il!i><~+_-?][}{1)(|/\\\\tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$\\u2591\\u2592\\u2593\\u2588\";\n  (function(){\n    const el=$('taImgAuto');\n    const fn=()=>{ el.classList.toggle('on'); const on=el.classList.contains('on'); el.setAttribute('aria-checked',String(on)); cfg.imageAutoDetail=on; cfg.imageRamp=on?MAX_DETAIL_RAMP:null; applyDetailAutoState(); push(); };\n    el.addEventListener('click',fn);\n    el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fn(); } });\n  })();\n  // greys + disables the manual Detail slider while Any ASCII Character is driving it\n  function applyDetailAutoState(){\n    const auto=!!cfg.imageAutoDetail, blk=$('taDetailBlock'), s=$('taImgDetail'), v=$('taImgDetailVal');\n    const tblk=$('taThicknessBlock'), ts=$('taImgThickness');\n    if(tblk){ tblk.classList.toggle('is-off',!auto); if(ts) ts.disabled=!auto; }\n    if(!blk) return;\n    blk.classList.toggle('is-auto',auto);\n    if(s) s.disabled=auto;\n    if(auto){ v.textContent=(engine&&engine.count)?('Auto \\u00b7 '+engine.count().toLocaleString()):'Auto'; }\n    else if(s){ v.textContent=(+s.value).toLocaleString(); }\n  }\n  applyDetailAutoState();   // initial state: Thickness disabled until Any ASCII Character is on\n  (function(){\n    const el=$('taImgInvert');\n    const fn=()=>{ el.classList.toggle('on'); const on=el.classList.contains('on'); el.setAttribute('aria-checked',String(on)); cfg.imageInvert=on; push(); };\n    el.addEventListener('click',fn);\n    el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fn(); } });\n  })();\n  (function(){\n    const el=$('taImgColor');\n    const fn=()=>{ el.classList.toggle('on'); const on=el.classList.contains('on'); el.setAttribute('aria-checked',String(on)); cfg.imageColor=on; push(); };\n    el.addEventListener('click',fn);\n    el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fn(); } });\n  })();\n  function applyImageFlip(){\n    if(!cfg._imageSrcOrig){ push(); return; }\n    if(!cfg.imageFlipV){ cfg.imageSrc=cfg._imageSrcOrig; push(); return; }\n    const img=new Image();\n    img.onload=function(){ const c=document.createElement('canvas'); c.width=img.width; c.height=img.height; const x=c.getContext('2d'); x.translate(0,img.height); x.scale(1,-1); x.drawImage(img,0,0); cfg.imageSrc=c.toDataURL(); push(); };\n    img.src=cfg._imageSrcOrig;\n  }\n  (function(){\n    const el=$('taImgFlip');\n    const fn=()=>{ el.classList.toggle('on'); const on=el.classList.contains('on'); el.setAttribute('aria-checked',String(on)); cfg.imageFlipV=on; applyImageFlip(); };\n    el.addEventListener('click',fn);\n    el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fn(); } });\n  })();\n  (function(){ const s=$('taImgDetail'),v=$('taImgDetailVal'); s.addEventListener('input',()=>{ cfg.imageDetail=+s.value; v.textContent=(+s.value).toLocaleString(); push(); }); })();\n  (function(){ const s=$('taImgThickness'),v=$('taImgThicknessVal'); s.addEventListener('input',()=>{ cfg.imageThickness=+s.value; v.textContent=s.value; push(); }); })();\n\n  // ---- reflect cfg back into every control (used by .json re-import setRange('taImgThickness',cfg.imageThickness==null?50:cfg.imageThickness);\n    syncColor('taTextSwatches','taTextColor',cfg.textColor); syncColor('taBgSwatches','taBgColor',cfg.bgColor);\n    applyDetailAutoState();\n    if(cfg.form==='image' && cfg.imageSrc){ $('taImgName').textContent='restored image'; $('taImgThumb').src=cfg.imageSrc; $('taImgRow').classList.add('show'); }\n    else { $('taImgRow').classList.remove('show'); }\n    suppressPush=false;\n  }\n\n  // ---- upload: image → glyph plane, .txt → glyph source, .json → restore state (all on-device) ----\n  const TA_KEYS=['text','charset','form','density','depth','motion','speed','amplitude','mouse','radius','strength','sfM','sfN1','sfN2','sfN3','scale','fontScale','roundness','lockRotation','imageSrc','imageInvert','imageColor','imageFlipV','imageDetail','imageAutoDetail','imageThickness','textColor','bgColor'];\n  function activateImageForm(name,src){\n    cfg.imageSrc=src; cfg._imageSrcOrig=src; cfg.form='image';\n    cfg.imageFlipV=false;\n    const flipEl=$('taImgFlip'); if(flipEl){ flipEl.classList.remove('on'); flipEl.setAttribute('aria-checked','false'); }\n    $('taForms').querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));\n    $('taUploadChip').classList.add('active');\n    $('taImgName').textContent=name||'image'; $('taImgThumb').src=src; $('taImgRow').classList.add('show');\n    onFormChange(); push();\n  }\n  function loadImageFile(f){\n    const rd=new FileReader();\n    rd.onerror=()=>toast('Couldn\\u2019t read that image');\n    rd.onload=()=>activateImageForm(f.name,rd.result);\n    rd.readAsDataURL(f);\n  }\n  function loadTextFile(f){\n    const rd=new FileReader();\n    rd.onerror=()=>toast('Couldn\\u2019t read that file');\n    rd.onload=()=>{\n      let txt=(rd.result||'').replace(/\\s+/g,' ').trim();\n      if(!txt){ toast('That .txt was empty'); return; }\n      if(txt.length>1600) txt=txt.slice(0,1600);\n      cfg.text=txt; cfg.charset='word';\n      if(cfg.form==='image'){ cfg.form='sphere'; cfg.imageSrc=null; $('taImgRow').classList.remove('show'); }\n      $('taText').value=txt; setActiveChip('taCharset','cs','word'); setActiveChip('taForms','form',cfg.form);\n      onFormChange(); push();\n      toast('Loaded text from '+(f.name||'file'));\n    };\n    rd.readAsText(f);\n  }\n  function loadJsonFile(f){\n    const rd=new FileReader();\n    rd.onerror=()=>toast('Couldn\\u2019t read that file');\n    rd.onload=()=>{\n      let obj;\n      try{ obj=JSON.parse(rd.result); }catch(_){ toast('Hmm \\u2014 that .json wouldn\\u2019t parse'); return; }\n      if(!obj||typeof obj!=='object'||(obj.form===undefined&&obj.density===undefined)){ toast('That isn\\u2019t a Glyphe export'); return; }\n      TA_KEYS.forEach(k=>{ if(obj[k]!==undefined) cfg[k]=obj[k]; });\n      syncUI(); onFormChange(); push();\n      toast('Restored state from '+(f.name||'file'));\n    };\n    rd.readAsText(f);\n  }\n  function loadHtmlFile(f){\n    const rd=new FileReader();\n    rd.onerror=()=>toast('Couldn\\u2019t read that file');\n    rd.onload=()=>{\n      let txt='';\n      try{ const doc=new DOMParser().parseFromString(rd.result||'','text/html');\n        doc.querySelectorAll('script,style,noscript,template').forEach(n=>n.remove());\n        txt=((doc.body||doc.documentElement).textContent||''); }catch(_){ txt=(rd.result||'').replace(/<[^>]*>/g,' '); }\n      txt=txt.replace(/\\s+/g,' ').trim();\n      if(!txt){ toast('No text found in that .html'); return; }\n      if(txt.length>1600) txt=txt.slice(0,1600);\n      cfg.text=txt; cfg.charset='word';\n      if(cfg.form==='image'){ cfg.form='sphere'; cfg.imageSrc=null; $('taImgRow').classList.remove('show'); }\n      $('taText').value=txt; setActiveChip('taCharset','cs','word'); setActiveChip('taForms','form',cfg.form);\n      onFormChange(); push();\n      toast('Loaded text from '+(f.name||'file'));\n    };\n    rd.readAsText(f);\n  }\n  function routeUpload(f){\n    if(!f) return;\n    const name=(f.name||'').toLowerCase(), type=f.type||'';\n    if(type.indexOf('image/')===0 || /\\.(png|jpe?g|gif|webp|bmp|svg)$/.test(name)) loadImageFile(f);\n    else if(type==='application/json' || name.endsWith('.json')) loadJsonFile(f);\n    else if(type==='text/html' || name.endsWith('.html') || name.endsWith('.htm')) loadHtmlFile(f);\n    else if(type.indexOf('text/')===0 || name.endsWith('.txt')) loadTextFile(f);\n    else toast('Unsupported file \\u2014 use an image, .txt, .json or .html');\n  }\n  (function(){\n    const file=$('taImgFile');\n    $('taUploadChip').addEventListener('click',()=>{ file.click(); });\n    file.addEventListener('change',e=>{ routeUpload(e.target.files && e.target.files[0]); e.target.value=''; });\n    $('taImgClear').addEventListener('click',()=>{\n      cfg.imageSrc=null; cfg._imageSrcOrig=null; cfg.imageFlipV=false;\n      const flipEl=$('taImgFlip'); if(flipEl){ flipEl.classList.remove('on'); flipEl.setAttribute('aria-checked','false'); }\n      $('taImgRow').classList.remove('show'); cfg.form='sphere';\n      $('taForms').querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));\n      const sph=$('taForms').querySelector('[data-form=\"sphere\"]'); if(sph) sph.classList.add('active');\n      onFormChange(); push();\n    });\n    // drag-and-drop onto the live text-art canvas\n    const dz=$('textPreview');\n    if(dz){\n      ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{ e.preventDefault(); dz.classList.add('drop-over'); }));\n      ['dragleave','dragend'].forEach(ev=>dz.addEventListener(ev,e=>{ if(e.target===dz) dz.classList.remove('drop-over'); }));\n      dz.addEventListener('drop',e=>{ e.preventDefault(); dz.classList.remove('drop-over'); const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0]; routeUpload(f); });\n    }\n  })();\n\n  // ---- superformula sliders (n-values are slider/100) ----\n  $('taSfM').addEventListener('input',e=>{ cfg.sfM=+e.target.value; $('taSfMVal').textContent=e.target.value; push(); });\n  function sfN(id,valId,key){ const s=$(id),v=$(valId); s.addEventListener('input',()=>{ const n=(+s.value)/100; cfg[key]=n; v.textContent=n.toFixed(2); push(); }); }\n  sfN('taSfN1','taSfN1Val','sfN1'); sfN('taSfN2','taSfN2Val','sfN2'); sfN('taSfN3','taSfN3Val','sfN3');\n\n  // ---- form size (scale = slider/100) ----\n  (function(){ const s=$('taScale'),v=$('taScaleVal'); s.addEventListener('input',()=>{ const n=(+s.value)/100; cfg.scale=n; v.innerHTML=n.toFixed(2)+'\\u00d7'; push(); }); })();\n  // ---- font size (fontScale = slider/100) ----\n  (function(){ const s=$('taFontScale'),v=$('taFontScaleVal'); s.addEventListener('input',()=>{ const n=(+s.value)/100; cfg.fontScale=n; v.innerHTML=n.toFixed(2)+'\\u00d7'; push(); }); })();\n\n  // form readout label\n  function formLabel(){ if(cfg.form==='image')return'Image'; if(cfg.form==='silhouette')return'Silhouette'; const a=$('taForms').querySelector('.chip.active'); return a?a.textContent.split(' ·')[0]:'Sphere'; }\n\n  // ---- sliders ----\n  function slider(id,valId,key,fmt){\n    const s=$(id),v=$(valId);\n    s.addEventListener('input',()=>{ cfg[key]=+s.value; v.textContent=fmt?fmt(s.value):s.value; push(); });\n  }\n  slider('taDensity','taDensityVal','density',v=>(+v).toLocaleString());\n  slider('taDepth','taDepthVal','depth');\n  slider('taSpeed','taSpeedVal','speed');\n  slider('taAmp','taAmpVal','amplitude');\n  slider('taRadius','taRadiusVal','radius');\n  slider('taStrength','taStrengthVal','strength');\n\n  // ---- text field ----\n  $('taText').addEventListener('input',e=>{ cfg.text=e.target.value; push(); });\n\n  // ---- push config to engine ----\n  let suppressPush=false;\n  function curCount(){\n    if(cfg.form==='image'){ return (engine && engine.count) ? engine.count() : (cfg.imageDetail||0); }\n    return (+$('taDensity').value);\n  }\n  function readout(){\n    $('taReadForm').textContent=formLabel();\n    $('taReadCount').textContent=curCount().toLocaleString();\n  }\n  function push(){\n    if(suppressPush) return;\n    if(engine) engine.update(Object.assign({}, cfg, {onfps:fps=>{$('taStatFps').textContent=fps||'—';}}));\n    if(cfg.form==='image' && cfg.imageAutoDetail && engine && engine.count){ $('taImgDetailVal').textContent='Auto \\u00b7 '+engine.count().toLocaleString(); }\n    readout();\n    $('taStatP').textContent=curCount().toLocaleString();\n  }\n\n  // ---- play / pause motion ----\n  const playIco='<svg viewBox=\"0 0 24 24\"><path d=\"M8 5l11 7-11 7z\"/><\u002Fsvg>';\n  const pauseIco='<svg viewBox=\"0 0 24 24\"><rect x=\"7\" y=\"6\" width=\"3.5\" height=\"12\" rx=\"1\"/><rect x=\"13.5\" y=\"6\" width=\"3.5\" height=\"12\" rx=\"1\"/><\u002Fsvg>';\n  $('taPlay').addEventListener('click',()=>{\n    if(!engine)return;\n    const now=!engine.isPlaying(); engine.setPlaying(now);\n    $('taPlay').innerHTML=now?pauseIco:playIco;\n    $('taPlay').classList.toggle('on',!now);\n  });\n\n  // ---- mode switching ----\n  function ensureEngine(){\n    if(engine) return;\n    engine=window.TextArtEngine($('taCanvas'), Object.assign({}, cfg, {onfps:fps=>{$('taStatFps').textContent=fps||'—';}}));\n    $('taStatP').textContent=(+$('taDensity').value).toLocaleString();\n  }\n  function setMode(m){\n    if(m===mode) return;\n    mode=m;\n    const isText=m==='text';\n    $('tabImage').classList.toggle('active',!isText); $('tabImage').setAttribute('aria-selected',String(!isText));\n    $('tabText').classList.toggle('active',isText); $('tabText').setAttribute('aria-selected',String(isText));\n    $('imageControls').hidden=isText; $('textControls').hidden=!isText;\n    $('imagePreview').hidden=isText; $('textPreview').hidden=!isText;\n    $('imageActions').hidden=isText; $('textActions').hidden=!isText;\n    $('btnOrig').hidden=isText; $('btnFontUp').hidden=isText; $('btnFontDown').hidden=isText;\n    $('taPlay').hidden=!isText; $('taReadout').hidden=!isText;\n    $('stageName').textContent=isText?'text-art.canvas':$('stageName').textContent;\n    if(isText){\n      ensureEngine();\n      engine.setPlaying(true); $('taPlay').innerHTML=pauseIco; $('taPlay').classList.remove('on');\n      requestAnimationFrame(()=>{ engine && engine.resize(); });\n      readout();\n    } else if(engine){\n      engine.setPlaying(false);\n    }\n  }\n  $('tabImage').addEventListener('click',()=>setMode('image'));\n  $('tabText').addEventListener('click',()=>setMode('text'));\n\n  // ---- export: self-contained .html ----\n  function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }\n  function buildStandalone(o){\n    const src=window.TextArtEngine.toString();\n    const clean={text:o.text,charset:o.charset,form:o.form,density:o.density,depth:o.depth,\n      motion:o.motion,speed:o.speed,amplitude:o.amplitude,mouse:o.mouse,radius:o.radius,\n      strength:o.strength,sfM:o.sfM,sfN1:o.sfN1,sfN2:o.sfN2,sfN3:o.sfN3,\n      scale:o.scale, fontScale:o.fontScale,\n      roundness:o.roundness, lockRotation:o.lockRotation, imageInvert:o.imageInvert, imageColor:o.imageColor,\n      imageDither:o.imageDither, imageDetail:o.imageDetail, imageAutoDetail:o.imageAutoDetail, imageThickness:o.imageThickness,\n      textColor:o.textColor,bgColor:o.bgColor};\n    if(o.form==='hands' && o.maskImage) clean.maskImage=o.maskImage;\n    if(o.form==='image' && o.imageSrc){ clean.imageSrc=o.imageSrc; if(o.imageRamp) clean.imageRamp=o.imageRamp; }\n    const safe=JSON.stringify(clean);\n    const title=(o.text||'Text Art').replace(/[<>&\"]/g,'').slice(0,40)||'Text Art';\n    return '<!doctype html><html lang=\"en\"><head><meta charset=\"utf-8\">'\n      +'<meta name=\"viewport\" content=\"width=device-width,initial-scale=1,viewport-fit=cover\">'\n      +'<title>'+title+' \\u2014 text art<\u002Ftitle>'\n      +'<style>html,body{margin:0;height:100%;width:100%;background:'+o.bgColor+';overflow:hidden}'\n      +'#stage{position:fixed;inset:0}#c{display:block;width:100%;height:100%;cursor:crosshair;touch-action:none}<\u002Fstyle>'\n      +'<\u002Fhead><body><div id=\"stage\"><canvas id=\"c\"><\u002Fcanvas><\u002Fdiv><script>\\n'\n      +'var TextArtEngine='+src+';\\n'\n      +'TextArtEngine(document.getElementById(\"c\"), '+safe+');\\n'\n      +'<\\/script><\u002Fbody><\u002Fhtml>';\n  }\n  $('taDownload').addEventListener('click',()=>{\n    const doc=buildStandalone(cfg);\n    const b=new Blob([doc],{type:'text/html'});\n    const a=document.createElement('a');\n    const fn=(cfg.text||'text-art').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,32)||'text-art';\n    a.href=URL.createObjectURL(b); a.download=fn+'-text-art.html'; a.click(); URL.revokeObjectURL(a.href);\n    toast('Saved '+fn+'-text-art.html');\n  });\n\n  // ---- Producer for the unified Export cluster ----\n  window.__expTxt={\n    hasData:()=>true,\n    fmtAvailable:(f)=>true,\n    suggestedName:(ext)=>{\n      const fn=(cfg.text||'text-art').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,32)||'text-art';\n      return fn+'-text-art.'+ext;\n    },\n    getText:(f)=>{\n      if(f==='txt') return cfg.text||'';\n      if(f==='json'){\n        const c=Object.assign({},cfg); delete c.maskImage; delete c.onfps; delete c._imageSrcOrig;\n        return JSON.stringify(c,null,2);\n      }\n      if(f==='html') return buildStandalone(cfg);\n      return null;\n    },\n    getPngBlob:()=>new Promise(res=>{\n      const cv=document.getElementById('taCanvas');\n      if(!cv) return res(null);\n      cv.toBlob(b=>res(b),'image/png');\n    })\n  };\n\n  readout();\n})();\n<\u002Fscript>\n\n<!-- ===================== NEW SHELL CHROME (additive only) ===================== -->\n<script>\n(function(){\n  const $=id=>document.getElementById(id);\n\n  /* ---- slider fill: paint the accent-filled portion of every range track ---- */\n  function paintFill(s){\n    const min=+s.min||0, max=+s.max||100, v=+s.value;\n    const pct=max>min?((v-min)/(max-min))*100:0;\n    s.style.setProperty('--fill',pct+'%');\n  }\n  const allRanges=[].slice.call(document.querySelectorAll('input[type=range]'));\n  allRanges.forEach(s=>{ paintFill(s); s.addEventListener('input',()=>paintFill(s)); });\n  // density / speed etc. may be reset programmatically — repaint on a light interval too\n  // (cheap, only touches sliders)\n\n  /* ---- FORMS accordion: one section open at a time ---- */\n  const acc=$('taForms');\n  if(acc){\n    acc.querySelectorAll('.acc-head').forEach(head=>{\n      const open=()=>{\n        const item=head.closest('.acc-item');\n        const isOpen=item.classList.contains('open');\n        acc.querySelectorAll('.acc-item').forEach(it=>{\n          it.classList.remove('open');\n          const h=it.querySelector('.acc-head'); if(h)h.setAttribute('aria-expanded','false');\n        });\n        if(!isOpen){ item.classList.add('open'); head.setAttribute('aria-expanded','true'); }\n      };\n      head.addEventListener('click',open);\n      head.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(); } });\n    });\n    // when a form chip is picked, make sure its category is the open one\n    acc.querySelectorAll('.chip').forEach(chip=>{\n      chip.addEventListener('click',()=>{\n        const item=chip.closest('.acc-item');\n        if(item && !item.classList.contains('open')){\n          acc.querySelectorAll('.acc-item').forEach(it=>{ it.classList.remove('open'); const h=it.querySelector('.acc-head'); if(h)h.setAttribute('aria-expanded','false'); });\n          item.classList.add('open'); const h=item.querySelector('.acc-head'); if(h)h.setAttribute('aria-expanded','true');\n        }\n      });\n    });\n  }\n\n  /* ---- right-panel mode toggle (mirrors the left-panel toggle in the engine IIFE) ---- */\n  function syncRightPanel(isText){\n    $('imageControlsRight').hidden=isText;\n    $('textControlsRight').hidden=!isText;\n    $('sbFormat').textContent = isText ? 'Interactive HTML' : (formatLabel());\n  }\n  $('tabImage').addEventListener('click',()=>syncRightPanel(false));\n  $('tabText').addEventListener('click',()=>syncRightPanel(true));\n\n  /* ---- viewport zoom ---- */\n  let zoom=1;\n  function applyZoom(){\n    document.getElementById('zoomWrap').style.setProperty('--zoom',zoom.toFixed(2));\n    $('zoomVal').textContent=Math.round(zoom*100)+'%';\n  }\n  $('zoomIn').addEventListener('click',()=>{ zoom=Math.min(2.5,zoom+0.1); applyZoom(); });\n  $('zoomOut').addEventListener('click',()=>{ zoom=Math.max(0.4,zoom-0.1); applyZoom(); });\n  applyZoom();\n\n  /* ---- grid toggle ---- */\n  const stage=$('previewCanvas');\n  $('gridToggle').addEventListener('click',()=>{\n    const on=stage.classList.toggle('grid-on');\n    $('gridState').textContent=on?'On':'Off';\n    $('gridToggle').classList.toggle('on',on);\n    $('gridToggle').setAttribute('aria-pressed',String(on));\n  });\n\n  /* ---- output-settings popover ---- */\n  const cfgBtn=$('cfgBtn'), cfgPop=$('cfgPop');\n  cfgBtn.addEventListener('click',e=>{ e.stopPropagation(); cfgPop.hidden=!cfgPop.hidden; cfgBtn.classList.toggle('on',!cfgPop.hidden); });\n  cfgPop.addEventListener('click',e=>e.stopPropagation());\n  document.addEventListener('click',()=>{ cfgPop.hidden=true; cfgBtn.classList.remove('on'); });\n\n  /* ---- status bar: live cursor X/Y, char under pointer, output format ---- */\n  const GLYPHS=\" .:-=+*#%@\";\n  function formatLabel(){\n    const isText=!$('tabText') ? false : $('tabText').classList.contains('active');\n    if(isText) return 'Interactive HTML';\n    const color=$('colorize').classList.contains('on');\n    const w=$('statW').textContent, h=$('statH').textContent;\n    const dims=(w!=='—'&&w)?(' · '+w+'×'+h):'';\n    return (color?'ANSI color':'Plain text')+dims;\n  }\n  function charForPos(x,y){\n    const isText=$('tabText').classList.contains('active');\n    if(isText){\n      const set=($('taText').value||'TEXT').replace(/\\s+/g,'')||'TEXT';\n      return set.charAt((Math.abs(x+y))%set.length);\n    }\n    return GLYPHS.charAt(Math.min(GLYPHS.length-1, Math.floor((y/Math.max(1,stage.clientHeight))*GLYPHS.length)));\n  }\n  stage.addEventListener('pointermove',e=>{\n    const r=stage.getBoundingClientRect();\n    const x=Math.max(0,Math.round(e.clientX-r.left));\n    const y=Math.max(0,Math.round(e.clientY-r.top));\n    $('sbX').textContent=x; $('sbY').textContent=y;\n    $('sbChar').textContent=charForPos(x,y);\n    $('sbFormat').textContent=formatLabel();\n  });\n  stage.addEventListener('pointerleave',()=>{ $('sbChar').textContent='—'; });\n  // keep the format readout fresh when image options change\n  ['colorize'].forEach(id=>$(id).addEventListener('click',()=>{ $('sbFormat').textContent=formatLabel(); }));\n\n  /* ---- text-art Statistics: derive Processing (frame time) + Memory from the live FPS ghost ---- */\n  const fpsGhost=$('taStatFps');\n  setInterval(()=>{\n    if(!$('tabText').classList.contains('active')) return;\n    const fps=parseFloat(fpsGhost.textContent);\n    if(fps>0){ $('taStatProc').textContent=Math.max(1,Math.round(1000/fps))+'ms'; }\n    const dens=parseInt(($('taStatP').textContent||'0').replace(/[^0-9]/g,''),10)||0;\n    let mb;\n    if(performance && performance.memory && performance.memory.usedJSHeapSize){\n      mb=performance.memory.usedJSHeapSize/1048576;\n    } else {\n      mb=(dens*180)/1048576 + 8; // estimate: per-glyph buffers + base\n    }\n    $('taStatMem').textContent=mb.toFixed(1)+' MB';\n  },600);\n\n  /* ---- Reset to Defaults (text mode) — replays the documented defaults through the existing handlers ---- */\n  const DEFAULTS={\n    text:'HELLO', charset:'word', form:'sphere',\n    density:2200, depth:55, motion:'orbit', speed:46, amplitude:48,\n    mouse:'follow', radius:52, strength:55,\n    sfM:7, sfN1:20, sfN2:170, sfN3:170, scale:100, fontScale:100\n  };\n  function setSlider(id,val){\n    const s=$(id); if(!s) return;\n    s.value=val; paintFill(s);\n    s.dispatchEvent(new Event('input',{bubbles:true}));\n  }\n  function clickIn(container,selector){\n    const el=document.querySelector('#'+container+' '+selector);\n    if(el) el.click();\n  }\n  $('taReset').addEventListener('click',()=>{\n    // text\n    $('taText').value=DEFAULTS.text;\n    $('taText').dispatchEvent(new Event('input',{bubbles:true}));\n    // segmented / chips (fires existing group() handlers → updates engine)\n    clickIn('taCharset','[data-cs=\"'+DEFAULTS.charset+'\"]');\n    clickIn('taForms','[data-form=\"'+DEFAULTS.form+'\"]');\n    clickIn('taMotion','[data-motion=\"'+DEFAULTS.motion+'\"]');\n    clickIn('taMouse','[data-m=\"'+DEFAULTS.mouse+'\"]');\n    // sliders\n    setSlider('taDensity',DEFAULTS.density);\n    setSlider('taDepth',DEFAULTS.depth);\n    setSlider('taSpeed',DEFAULTS.speed);\n    setSlider('taAmp',DEFAULTS.amplitude);\n    setSlider('taRadius',DEFAULTS.radius);\n    setSlider('taStrength',DEFAULTS.strength);\n    setSlider('taSfM',DEFAULTS.sfM);\n    setSlider('taSfN1',DEFAULTS.sfN1);\n    setSlider('taSfN2',DEFAULTS.sfN2);\n    setSlider('taSfN3',DEFAULTS.sfN3);\n    setSlider('taScale',DEFAULTS.scale);\n    setSlider('taFontScale',DEFAULTS.fontScale);\n    // colors — first swatch in each row\n    clickIn('taTextSwatches','.swatch');\n    clickIn('taBgSwatches','.swatch');\n    const t=$('toast'); if(t){ t.textContent='Reset to defaults'; t.classList.add('show'); clearTimeout(t._rt); t._rt=setTimeout(()=>t.classList.remove('show'),1500); }\n  });\n\n  /* ===================================================================\n     Unified Export cluster\n     - one selected format drives Export, Copy, and the dropdown\n     - works identically in both tabs (Image / GIF and Text Art)\n     =================================================================== */\n  (function(){\n    const EXT={png:'png',html:'html',txt:'txt',json:'json'};\n    const LABEL={png:'PNG',html:'HTML',txt:'txt',json:'JSON'};\n    const MIME={txt:'text/plain',html:'text/html',json:'application/json'};\n    const goBtn=$('expGo'), copyBtn=$('expCopy'), cfgBtn=$('expCfg'), pop=$('expPop'), label=$('expFmt');\n    const opts=[...pop.querySelectorAll('.exp-opt')];\n    let fmt='png';\n\n    function producer(){\n      const isText=$('tabText').classList.contains('active');\n      return isText?window.__expTxt:window.__expImg;\n    }\n    function syncOpts(){\n      const p=producer();\n      opts.forEach(o=>{\n        const f=o.dataset.fmt;\n        const ok=p?p.fmtAvailable(f):false;\n        o.disabled=!ok;\n        o.setAttribute('aria-checked', f===fmt?'true':'false');\n      });\n    }\n    function syncCluster(){\n      const p=producer(), has=p?p.hasData():false, ok=p?p.fmtAvailable(fmt):false;\n      label.textContent=LABEL[fmt];\n      goBtn.disabled = !has || !ok;\n      copyBtn.disabled = !has || !ok;\n      syncOpts();\n    }\n\n    function openPop(){ pop.hidden=false; cfgBtn.setAttribute('aria-expanded','true'); cfgBtn.classList.add('on');\n      const cur=opts.find(o=>o.dataset.fmt===fmt)||opts[0]; cur && cur.focus(); }\n    function closePop(){ pop.hidden=true; cfgBtn.setAttribute('aria-expanded','false'); cfgBtn.classList.add('on'); /* sliders icon stays accent-filled per mock */ }\n    function togglePop(){ pop.hidden ? openPop() : closePop(); }\n\n    cfgBtn.addEventListener('click',e=>{ e.stopPropagation(); togglePop(); });\n    document.addEventListener('click',e=>{ if(!pop.hidden && !pop.contains(e.target) && e.target!==cfgBtn) closePop(); });\n    document.addEventListener('keydown',e=>{\n      if(e.key==='Escape' && !pop.hidden){ closePop(); cfgBtn.focus(); }\n    });\n    pop.addEventListener('keydown',e=>{\n      const enabled=opts.filter(o=>!o.disabled);\n      const i=enabled.indexOf(document.activeElement);\n      if(e.key==='ArrowDown'){ e.preventDefault(); (enabled[(i+1+enabled.length)%enabled.length]||enabled[0]).focus(); }\n      else if(e.key==='ArrowUp'){ e.preventDefault(); (enabled[(i-1+enabled.length)%enabled.length]||enabled[0]).focus(); }\n      else if(e.key==='Home'){ e.preventDefault(); enabled[0]&&enabled[0].focus(); }\n      else if(e.key==='End'){ e.preventDefault(); enabled[enabled.length-1]&&enabled[enabled.length-1].focus(); }\n    });\n\n    opts.forEach(o=>o.addEventListener('click',e=>{\n      e.stopPropagation();\n      if(o.disabled) return;\n      fmt=o.dataset.fmt;\n      syncCluster();\n      closePop();\n      goBtn.focus();\n    }));\n\n    function flash(msg){ const t=$('toast'); if(!t) return; t.textContent=msg; t.classList.add('show'); clearTimeout(t._fx); t._fx=setTimeout(()=>t.classList.remove('show'),1600); }\n\n    async function doExport(){\n      const p=producer(); if(!p||goBtn.disabled) return;\n      if(fmt==='png'){\n        const blob=await p.getPngBlob(); if(!blob) return flash('Nothing to export yet');\n        triggerDownload(blob, p.suggestedName('png'));\n        flash('Saved '+p.suggestedName('png'));\n      } else {\n        const s=p.getText(fmt); if(s==null) return flash('Nothing to export yet');\n        const blob=new Blob([s],{type:MIME[fmt]});\n        triggerDownload(blob, p.suggestedName(EXT[fmt]));\n        flash('Saved '+p.suggestedName(EXT[fmt]));\n      }\n    }\n    function triggerDownload(blob,name){\n      const u=URL.createObjectURL(blob);\n      const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove();\n      setTimeout(()=>URL.revokeObjectURL(u),200);\n    }\n\n    async function doCopy(){\n      const p=producer(); if(!p||copyBtn.disabled) return;\n      try{\n        if(fmt==='png'){\n          const blob=await p.getPngBlob(); if(!blob) return flash('Nothing to copy yet');\n          if(window.ClipboardItem && navigator.clipboard && navigator.clipboard.write){\n            await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);\n            flash('Copied image');\n          } else { flash('Image copy unsupported here'); }\n        } else {\n          const s=p.getText(fmt); if(s==null) return flash('Nothing to copy yet');\n          if(navigator.clipboard && navigator.clipboard.writeText){\n            await navigator.clipboard.writeText(s);\n          } else {\n            const ta=document.createElement('textarea'); ta.value=s; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();\n          }\n          flash('Copied '+LABEL[fmt]);\n        }\n      } catch(err){ flash('Copy failed'); }\n    }\n\n    goBtn.addEventListener('click',doExport);\n    copyBtn.addEventListener('click',doCopy);\n\n    // Re-sync availability whenever the underlying state could change\n    const obs=new MutationObserver(syncCluster);\n    obs.observe($('dlBtn'),{attributes:true,attributeFilter:['disabled']});  // image: enabled on load, disabled on clear\n    obs.observe($('dlHtml'),{attributes:true,attributeFilter:['class']});    // image: animated vs still\n    $('tabImage').addEventListener('click',syncCluster);\n    $('tabText').addEventListener('click',syncCluster);\n    $('taText') && $('taText').addEventListener('input',syncCluster);\n    setInterval(syncCluster,800); // cheap belt-and-braces\n\n    syncCluster();\n  })();\n\n  /* ---- initial state ---- */\n  syncRightPanel(false);\n  $('sbFormat').textContent=formatLabel();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
